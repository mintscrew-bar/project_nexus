name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 최소 권한 원칙: 워크플로우 전체에 읽기 권한만 부여
permissions:
  contents: read

jobs:
  ci:
    name: Lint / Build / Test
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v6

      # 버전은 루트 package.json의 packageManager 필드(pnpm@8.15.0)에서 읽는다.
      # version 입력을 함께 주면 버전이 어긋날 때 에러가 나므로 단일 출처로 유지한다.
      - name: pnpm 설치
        uses: pnpm/action-setup@v6

      - name: Node.js 22 설정
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: 의존성 설치
        run: pnpm install --frozen-lockfile

      - name: Prisma 클라이언트 생성
        run: pnpm db:generate

      - name: 린트
        run: pnpm lint

      - name: 빌드
        run: pnpm build
        env:
          # Next.js standalone 빌드에 필요한 더미 환경변수
          NEXTAUTH_SECRET: ci-dummy-secret
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:4000
          API_URL: http://localhost:4000

      - name: 테스트
        run: pnpm test -- -- --passWithNoTests

  # Docker 이미지 빌드 + GHCR 푸시
  # - main 브랜치 push 일 때만 실행 (PR 에서는 스킵)
  # - GitHub-hosted runner 에서 빌드 → 운영 서버 부하 0
  docker:
    name: Docker Build & Push
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      # ghcr.io 는 lowercase 강제 — 소유자/저장소가 이미 lowercase 라 그대로 사용
      IMAGE_PREFIX: ghcr.io/mintscrew-bar/project_nexus

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v6

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v4

      - name: GHCR 로그인
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: API 이미지 빌드 & 푸시
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_PREFIX }}/api:latest
            ${{ env.IMAGE_PREFIX }}/api:${{ github.sha }}
          # GitHub Actions cache 사용 (저장소당 10GB LRU 자동 관리)
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Web 이미지 빌드 & 푸시
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_UPLOADS_BASE_URL=${{ vars.NEXT_PUBLIC_UPLOADS_BASE_URL }}
            NEXT_PUBLIC_GA_ID=${{ vars.NEXT_PUBLIC_GA_ID }}
            API_URL=http://api:4000
          tags: |
            ${{ env.IMAGE_PREFIX }}/web:latest
            ${{ env.IMAGE_PREFIX }}/web:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  # CI(lint/test/build 또는 이미지 빌드·푸시) 실패 시 Discord 알림.
  # main push 에서만 동작 — PR 실패는 작성자가 직접 인지하므로 제외.
  # GitHub-hosted 러너에서 실행되므로 운영 서버 상태와 무관하게 항상 발송된다.
  notify-failure:
    name: Notify CI failure
    needs: [ci, docker]
    if: ${{ failure() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Discord 실패 알림
        env:
          WEBHOOK: ${{ secrets.DEPLOY_ALERT_DISCORD_WEBHOOK }}
        run: |
          # 시크릿 미설정 시 조용히 스킵 (알림 없음 ≠ 워크플로우 실패)
          if [ -z "$WEBHOOK" ]; then
            echo "DEPLOY_ALERT_DISCORD_WEBHOOK 미설정 — 알림 생략"
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          CONTENT=$(printf '🚨 **CI 실패** — `%s`\n브랜치: `main` / 커밋: `%s`\n작성자: %s\n%s\n→ 이미지 빌드/푸시 실패로 이번 커밋은 배포되지 않습니다.' \
            "${{ github.repository }}" "${{ github.sha }}" "${{ github.actor }}" "$RUN_URL")
          PAYLOAD=$(jq -n --arg c "$CONTENT" '{content:$c}')
          curl -fsS -X POST -H "Content-Type: application/json" -d "$PAYLOAD" "$WEBHOOK"
