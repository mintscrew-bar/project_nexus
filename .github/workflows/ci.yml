name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 최소 권한 원칙: 워크플로우 전체에 읽기 권한만 부여
permissions:
  contents: read

# Node20 액션 deprecation 대응: 아직 Node24 네이티브 버전이 없는 JS 액션
# (예: pnpm/action-setup@v4)을 Node24로 강제 실행. 2026-06-02부터 기본 동작.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  ci:
    name: Lint / Build / Test
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v6

      - name: pnpm 설치
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.0

      - name: Node.js 22 설정
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: 의존성 설치
        run: pnpm install --frozen-lockfile

      - name: Prisma 클라이언트 생성
        run: pnpm db:generate

      - name: 린트
        run: pnpm lint

      - name: 빌드
        run: pnpm build
        env:
          # Next.js standalone 빌드에 필요한 더미 환경변수
          NEXTAUTH_SECRET: ci-dummy-secret
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:4000
          API_URL: http://localhost:4000

      - name: 테스트
        run: pnpm test -- -- --passWithNoTests

  # Docker 이미지 빌드 + GHCR 푸시
  # - main 브랜치 push 일 때만 실행 (PR 에서는 스킵)
  # - GitHub-hosted runner 에서 빌드 → 운영 서버 부하 0
  docker:
    name: Docker Build & Push
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      # ghcr.io 는 lowercase 강제 — 소유자/저장소가 이미 lowercase 라 그대로 사용
      IMAGE_PREFIX: ghcr.io/mintscrew-bar/project_nexus

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v6

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: API 이미지 빌드 & 푸시
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_PREFIX }}/api:latest
            ${{ env.IMAGE_PREFIX }}/api:${{ github.sha }}
          # GitHub Actions cache 사용 (저장소당 10GB LRU 자동 관리)
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Web 이미지 빌드 & 푸시
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_UPLOADS_BASE_URL=${{ vars.NEXT_PUBLIC_UPLOADS_BASE_URL }}
            NEXT_PUBLIC_GA_ID=${{ vars.NEXT_PUBLIC_GA_ID }}
            API_URL=http://api:4000
          tags: |
            ${{ env.IMAGE_PREFIX }}/web:latest
            ${{ env.IMAGE_PREFIX }}/web:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
