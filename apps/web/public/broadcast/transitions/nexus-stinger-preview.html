<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NEXUS Stinger Transition Preview</title>
    <style>
      :root {
        --bg: #07070a;
        --ink: #f8f8ff;
        --muted: rgba(248, 248, 255, 0.62);
        --violet: #7c5cff;
        --violet-2: #9b6cff;
        --cyan: #25d7f5;
        --blue: #667eea;
        --panel: #101014;
        --panel-2: #171721;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: var(--bg);
        overflow: hidden;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body.alpha {
        background: transparent;
      }

      .wrap {
        display: grid;
        width: 100%;
        height: 100%;
        place-items: center;
      }

      .stage {
        position: relative;
        width: min(100vw, calc(100vh * 16 / 9));
        aspect-ratio: 16 / 9;
        overflow: hidden;
        isolation: isolate;
        background: transparent;
      }

      .preview-bg {
        position: absolute;
        inset: 0;
        z-index: 0;
        background:
          linear-gradient(90deg, rgba(124, 92, 255, 0.08), transparent 32%, rgba(37, 215, 245, 0.08)),
          radial-gradient(circle at 22% 24%, rgba(102, 126, 234, 0.28), transparent 25%),
          radial-gradient(circle at 76% 72%, rgba(37, 215, 245, 0.2), transparent 24%),
          #0b0b10;
      }

      .preview-bg::before {
        content: "";
        position: absolute;
        inset: 0;
        opacity: 0.16;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.16) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.16) 1px, transparent 1px);
        background-size: 72px 72px;
      }

      .preview-card {
        position: absolute;
        top: 7.5%;
        left: 6.5%;
        width: 27%;
        height: 16%;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.08);
      }

      .preview-card.right {
        right: 6.5%;
        left: auto;
      }

      .preview-copy {
        position: absolute;
        left: 6.5%;
        bottom: 8%;
        color: rgba(255, 255, 255, 0.32);
        font-size: clamp(12px, 1vw, 18px);
        font-weight: 800;
        letter-spacing: 0.18em;
      }

      body.alpha .preview-bg,
      body.alpha .preview-card,
      body.alpha .preview-copy {
        display: none;
      }

      .dim {
        position: absolute;
        inset: 0;
        z-index: 1;
        background: rgba(0, 0, 0, 0);
        animation: dim 1.12s cubic-bezier(0.2, 0.9, 0.2, 1) forwards;
      }

      .cover {
        position: absolute;
        inset: -32%;
        z-index: 2;
        transform: translateX(-132%) skewX(-18deg);
        background:
          linear-gradient(90deg, rgba(8, 8, 12, 0), rgba(8, 8, 12, 0.98) 18%, rgba(16, 16, 22, 1) 50%, rgba(8, 8, 12, 0.98) 82%, rgba(8, 8, 12, 0)),
          linear-gradient(135deg, rgba(124, 92, 255, 0.2), rgba(37, 215, 245, 0.12));
        animation: cover 1.12s cubic-bezier(0.76, 0, 0.24, 1) forwards;
      }

      .cover.secondary {
        z-index: 3;
        inset: -40%;
        width: 54%;
        left: 13%;
        background: linear-gradient(90deg, transparent, rgba(124, 92, 255, 0.9), rgba(37, 215, 245, 0.8), transparent);
        opacity: 0.9;
        animation: slash 1.12s cubic-bezier(0.76, 0, 0.24, 1) forwards;
      }

      .line {
        position: absolute;
        left: -12%;
        width: 124%;
        height: 0.32%;
        z-index: 4;
        transform: translateX(-110%) rotate(-11deg);
        transform-origin: center;
        background: linear-gradient(90deg, transparent, var(--cyan), var(--violet), white, transparent);
        animation: lineSweep 1.12s cubic-bezier(0.76, 0, 0.24, 1) forwards;
      }

      .line.one {
        top: 37%;
      }

      .line.two {
        top: 52%;
        animation-delay: 0.05s;
        opacity: 0.72;
      }

      .line.three {
        top: 66%;
        animation-delay: 0.09s;
        opacity: 0.54;
      }

      .brand {
        position: absolute;
        inset: 0;
        z-index: 5;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 30px;
        color: var(--ink);
        opacity: 0;
        transform: scale(0.94);
        animation: brand 1.12s cubic-bezier(0.2, 0.9, 0.2, 1) forwards;
      }

      .symbol-shell {
        position: relative;
        width: 124px;
        height: 124px;
        border-radius: 30px;
        background: linear-gradient(135deg, var(--blue), var(--violet-2));
        display: grid;
        place-items: center;
        overflow: hidden;
      }

      .symbol-shell::after {
        content: "";
        position: absolute;
        inset: -60%;
        transform: rotate(-18deg) translateX(-80%);
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.38), transparent);
        animation: shine 1.12s cubic-bezier(0.2, 0.9, 0.2, 1) forwards;
      }

      .symbol {
        position: relative;
        z-index: 1;
        width: 82px;
        height: 82px;
      }

      .wordmark {
        display: flex;
        flex-direction: column;
        gap: 5px;
        min-width: 360px;
      }

      .wordmark strong {
        font-size: 82px;
        font-weight: 950;
        line-height: 0.92;
        letter-spacing: 0.05em;
      }

      .wordmark span {
        color: var(--muted);
        font-size: 17px;
        font-weight: 800;
        letter-spacing: 0.24em;
      }

      .tag {
        position: absolute;
        left: 50%;
        bottom: 31.5%;
        z-index: 5;
        transform: translateX(-50%);
        color: rgba(255, 255, 255, 0.72);
        font-size: 13px;
        font-weight: 900;
        letter-spacing: 0.32em;
        opacity: 0;
        animation: tag 1.12s cubic-bezier(0.2, 0.9, 0.2, 1) forwards;
      }

      .corner {
        position: absolute;
        z-index: 4;
        width: 74px;
        height: 74px;
        border-color: rgba(255, 255, 255, 0.58);
        opacity: 0;
        animation: corner 1.12s cubic-bezier(0.2, 0.9, 0.2, 1) forwards;
      }

      .corner.lt {
        top: 17%;
        left: 24%;
        border-top: 3px solid;
        border-left: 3px solid;
      }

      .corner.rb {
        right: 24%;
        bottom: 17%;
        border-right: 3px solid;
        border-bottom: 3px solid;
      }

      .hint {
        position: fixed;
        right: 16px;
        bottom: 14px;
        z-index: 10;
        color: rgba(255, 255, 255, 0.48);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      body.alpha .hint {
        display: none;
      }

      @keyframes dim {
        0%,
        100% {
          background: rgba(0, 0, 0, 0);
        }
        30%,
        60% {
          background: rgba(0, 0, 0, 0.28);
        }
      }

      @keyframes cover {
        0% {
          transform: translateX(-132%) skewX(-18deg);
        }
        38% {
          transform: translateX(-8%) skewX(-18deg);
        }
        52% {
          transform: translateX(0%) skewX(-18deg);
        }
        100% {
          transform: translateX(132%) skewX(-18deg);
        }
      }

      @keyframes slash {
        0% {
          transform: translateX(-210%) skewX(-18deg);
        }
        45% {
          transform: translateX(2%) skewX(-18deg);
        }
        100% {
          transform: translateX(280%) skewX(-18deg);
        }
      }

      @keyframes lineSweep {
        0% {
          transform: translateX(-110%) rotate(-11deg);
        }
        100% {
          transform: translateX(110%) rotate(-11deg);
        }
      }

      @keyframes brand {
        0%,
        22% {
          opacity: 0;
          transform: scale(0.94) translateY(10px);
        }
        40%,
        64% {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
        100% {
          opacity: 0;
          transform: scale(1.03) translateY(-8px);
        }
      }

      @keyframes tag {
        0%,
        30% {
          opacity: 0;
          transform: translateX(-50%) translateY(8px);
        }
        45%,
        60% {
          opacity: 1;
          transform: translateX(-50%) translateY(0);
        }
        100% {
          opacity: 0;
          transform: translateX(-50%) translateY(-8px);
        }
      }

      @keyframes corner {
        0%,
        28% {
          opacity: 0;
          transform: scale(0.82);
        }
        42%,
        62% {
          opacity: 1;
          transform: scale(1);
        }
        100% {
          opacity: 0;
          transform: scale(1.08);
        }
      }

      @keyframes shine {
        0%,
        38% {
          transform: rotate(-18deg) translateX(-80%);
        }
        70%,
        100% {
          transform: rotate(-18deg) translateX(80%);
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <main class="stage" aria-label="NEXUS stinger transition">
        <div class="preview-bg"></div>
        <div class="preview-card"></div>
        <div class="preview-card right"></div>
        <div class="preview-copy">PREVIEW BACKGROUND</div>

        <div class="dim"></div>
        <div class="cover"></div>
        <div class="cover secondary"></div>
        <div class="line one"></div>
        <div class="line two"></div>
        <div class="line three"></div>

        <div class="corner lt"></div>
        <div class="corner rb"></div>

        <section class="brand" aria-hidden="true">
          <div class="symbol-shell">
            <img class="symbol" src="../../images/nexus-symbol.svg" alt="" />
          </div>
          <div class="wordmark">
            <strong>NEXUS</strong>
            <span>CUSTOM GAME BROADCAST</span>
          </div>
        </section>
        <div class="tag">SCENE TRANSITION</div>
      </main>
    </div>
    <div class="hint">click to replay · add ?alpha=1 for transparent export</div>

    <script>
      const params = new URLSearchParams(window.location.search);
      if (params.get("alpha") === "1") {
        document.body.classList.add("alpha");
      }

      document.addEventListener("click", () => {
        const stage = document.querySelector(".stage");
        const clone = stage.cloneNode(true);
        stage.replaceWith(clone);
      });
    </script>
  </body>
</html>
