version: "3.8"

# 개발용 Docker Compose - 전체 스택 (DB + Redis + API + Web)
# 사용법: docker compose -f docker-compose.dev.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: nexus-postgres-dev
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus_password
      POSTGRES_DB: nexus
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: nexus-redis-dev
    command: redis-server
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: nexus-api-dev
    command: >
      sh -c "
        pnpm install &&
        pnpm --filter @nexus/database db:generate &&
        pnpm --filter @nexus/types build &&
        pnpm --filter @nexus/database build &&
        pnpm --filter @nexus/api dev
      "
    volumes:
      - .:/app
      - dev_node_modules:/app/node_modules
    ports:
      - "4000:4000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://nexus:nexus_password@postgres:5432/nexus?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:4000/api || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: nexus-web-dev
    command: pnpm --filter @nexus/web dev -- -H 0.0.0.0
    volumes:
      - .:/app
      - dev_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      API_URL: http://api:4000
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data_dev:
  dev_node_modules:
