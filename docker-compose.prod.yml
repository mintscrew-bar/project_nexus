name: nexus

# 모든 서비스 공통 로그 설정 — 컨테이너 로그 무한 누적으로 인한 디스크 잠식 방지
# (TODO_server_reliability Task 2). 서비스당 최대 30MB(10MB × 3파일)로 제한.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    container_name: nexus-postgres
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-nexus}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexus} -d ${POSTGRES_DB:-nexus}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    logging: *default-logging
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    # 운영: GHCR에서 pull. 로컬 dev 폴백용으로 build 섹션은 유지.
    # 롤백 시: IMAGE_TAG=<commit-sha> docker compose -f docker-compose.prod.yml up -d
    image: ghcr.io/mintscrew-bar/project_nexus/api:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: nexus-api
    restart: unless-stopped
    logging: *default-logging
    # unhealthy 시 autoheal이 자동 재시작하도록 라벨 부여 (Task 7)
    labels:
      - autoheal=true
    env_file:
      - ${NEXUS_ENV_FILE:-.env.production}
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-nexus}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-nexus}?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - "${API_BIND_HOST:-127.0.0.1}:${API_HOST_PORT:-4000}:4000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 60s

  web:
    # 운영: GHCR에서 pull. 로컬 dev 폴백용으로 build 섹션은 유지.
    image: ghcr.io/mintscrew-bar/project_nexus/web:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
        NEXT_PUBLIC_UPLOADS_BASE_URL: ${NEXT_PUBLIC_UPLOADS_BASE_URL:-}
        # Next.js rewrites destination — 컴포즈 내부 호스트명 사용
        API_URL: http://api:4000
    container_name: nexus-web
    restart: unless-stopped
    logging: *default-logging
    environment:
      NODE_ENV: production
      API_URL: http://api:4000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_UPLOADS_BASE_URL: ${NEXT_PUBLIC_UPLOADS_BASE_URL:-}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
    depends_on:
      api:
        condition: service_healthy
    # unhealthy 시 autoheal이 자동 재시작하도록 라벨 부여 (Task 7)
    labels:
      - autoheal=true
    # Next.js 서버 생존 확인. status<500 이면 응답한 것으로 간주(리다이렉트 포함).
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: nexus-nginx
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api
    labels:
      - autoheal=true
    # nginx 자체 생존만 확인하는 /healthz (upstream 무관)
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: nexus-cloudflared
    restart: unless-stopped
    logging: *default-logging
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN is required}
    depends_on:
      - nginx

  uptime-kuma:
    image: louislam/uptime-kuma:2
    container_name: nexus-uptime-kuma
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - uptime_kuma_data:/app/data
    ports:
      - "127.0.0.1:${UPTIME_KUMA_HOST_PORT:-3001}:3001"

  # 컨테이너 자가 복구 (Task 7). autoheal=true 라벨이 붙은 컨테이너가
  # healthcheck 상 unhealthy 가 되면 자동으로 재시작한다.
  # restart: unless-stopped 는 프로세스가 죽어 exit 했을 때만 동작하고,
  # "떠 있지만 응답 불능(healthy→unhealthy)" 상태는 못 잡으므로 이를 보완한다.
  # ⚠️ 컨테이너 재시작 권한을 위해 docker.sock 을 마운트한다(autoheal 필수).
  autoheal:
    image: willfarrell/autoheal:latest
    container_name: nexus-autoheal
    restart: unless-stopped
    logging: *default-logging
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: 10 # 10초마다 unhealthy 컨테이너 검사
      AUTOHEAL_START_PERIOD: 60 # 기동 후 60초는 유예
      DOCKER_SOCK: /var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  uptime_kuma_data:
