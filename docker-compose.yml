services:
  postgres:
    image: postgres:16-alpine
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus_password
      POSTGRES_DB: nexus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    command: redis-server
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: nexus-api
    restart: unless-stopped
    command: >
      sh -c "
        pnpm install &&
        pnpm --filter @nexus/database db:generate &&
        (pnpm --filter @nexus/database db:migrate:deploy || pnpm --filter @nexus/database db:push:accept) &&
        pnpm --filter @nexus/types build &&
        pnpm --filter @nexus/database build &&
        pnpm --filter @nexus/api dev
      "
    volumes:
      - .:/app
      - dev_node_modules:/app/node_modules
    ports:
      - "${API_HOST_PORT:-4000}:4000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://nexus:nexus_password@postgres:5432/nexus?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 4000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: nexus-web
    restart: unless-stopped
    command: pnpm --filter @nexus/web dev -- -H 0.0.0.0
    volumes:
      - .:/app
      - dev_node_modules:/app/node_modules
    ports:
      - "${WEB_HOST_PORT:-3000}:3000"
    env_file: .env
    environment:
      API_URL: http://api:4000
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXTAUTH_URL: http://localhost:3000
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  dev_node_modules:
