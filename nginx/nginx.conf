events {
  worker_connections 1024;
}

http {
  # WebSocket 업그레이드 헤더 맵 (Socket.IO 지원)
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream api {
    server api:4000;
  }

  upstream web {
    server web:3000;
  }

  server {
    listen 80;
    server_name _;

    # 클라이언트 최대 업로드 크기
    client_max_body_size 10m;

    # NextAuth 핸들러는 Next.js에서 처리 (/api/auth/* → web:3000)
    # next.config.mjs rewrites에서 이 경로를 의도적으로 제외했기 때문에 일치시켜야 함
    location /api/auth/ {
      proxy_pass http://web;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /api/* → NestJS API 서버로 프록시
    location /api/ {
      proxy_pass http://api;
      proxy_http_version 1.1;

      # WebSocket 업그레이드 헤더
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      # 프록시 헤더
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # 타임아웃 설정 (Socket.IO 롱폴링 대비)
      proxy_read_timeout 86400s;
      proxy_send_timeout 86400s;
    }

    # Socket.IO 네임스페이스들 → API 서버로 프록시
    # /socket.io/ 경로도 API로 전달
    location /socket.io/ {
      proxy_pass http://api;
      proxy_http_version 1.1;

      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_read_timeout 86400s;
      proxy_send_timeout 86400s;
    }

    # /* → Next.js 웹 서버로 프록시
    location / {
      proxy_pass http://web;
      proxy_http_version 1.1;

      # Next.js HMR WebSocket 지원
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
