events {
  worker_connections 1024;
}

http {
  # WebSocket 업그레이드 헤더 맵 (Socket.IO 지원)
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # Docker 내부 DNS (127.0.0.11) — 컨테이너 재시작 시 IP 동적 갱신
  resolver 127.0.0.11 valid=10s ipv6=off;

  server {
    listen 80;
    server_name _;

    # 동적 DNS 해석을 위해 변수로 upstream 선언
    set $api_upstream  http://api:4000;
    set $web_upstream  http://web:3000;

    # 클라이언트 최대 업로드 크기
    client_max_body_size 10m;

    # 컨테이너 healthcheck 전용 경량 엔드포인트.
    # upstream(web/api) 의존 없이 nginx 프로세스 생존만 확인한다 → autoheal 연동.
    location = /healthz {
      access_log off;
      add_header Content-Type text/plain;
      return 200 "ok";
    }

    # CSP Report-Only 위반 수집은 Next.js Route Handler가 처리한다.
    # 정확 경로를 먼저 선언해 일반 /api/* NestJS 프록시보다 우선시한다.
    location = /api/csp-report {
      proxy_pass $web_upstream;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js가 refresh_token 쿠키를 설정하는 콜백 라우트 → web
    location = /api/auth/callback {
      proxy_pass $web_upstream;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js 프록시 라우트 (refresh_token 쿠키 → Authorization 헤더 변환)
    location ~ ^/api/auth/(me|refresh|logout|login|register)$ {
      proxy_pass $web_upstream;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 나머지 /api/auth/* (discord, google, agree, link 등) → NestJS API
    location /api/auth/ {
      proxy_pass $api_upstream;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /api/* → NestJS API 서버로 프록시
    location /api/ {
      proxy_pass $api_upstream;
      proxy_http_version 1.1;

      # WebSocket 업그레이드 헤더
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      # 프록시 헤더
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # 타임아웃 설정 (Socket.IO 롱폴링 대비)
      proxy_read_timeout 86400s;
      proxy_send_timeout 86400s;
    }

    # Socket.IO 네임스페이스들 → API 서버로 프록시
    # /socket.io/ 경로도 API로 전달
    location /socket.io/ {
      proxy_pass $api_upstream;
      proxy_http_version 1.1;

      # WebSocket: 버퍼링 비활성화 (프레임을 즉시 전달)
      proxy_buffering off;

      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_read_timeout 86400s;
      proxy_send_timeout 86400s;
    }

    # /* → Next.js 웹 서버로 프록시
    location / {
      proxy_pass $web_upstream;
      proxy_http_version 1.1;

      # Next.js HMR WebSocket 지원
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
